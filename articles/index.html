<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Geir-Hugo Hanssen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../styles.css">
</head>

<body class="dark-mode">
    <header class="site-header">
        <div class="header-content">
            <div class="header-left">
                <div class="name-row">
                    <h1 class="site-title">Geir-Hugo Hanssen</h1>
                </div>
                <p class="header-tagline">Intune - Powershell</p>
            </div>
            <nav class="header-nav">
                <a href="../" class="nav-link">Home</a>
                <a href="../articles/" class="nav-link">Articles</a>
                <a href="editor/" class="nav-link">MD Editor</a>
                <a href="../#contact" class="nav-link">Contact</a>
                <button id="darkModeToggle" class="dark-mode-btn" title="Toggle dark mode">
                    <i class="fas fa-moon"></i>
                </button>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero" style="padding: 3rem 1.5rem 2rem;">
            <div class="hero-content">
                <h2 class="hero-heading">Blog<span class="hero-accent">.</span></h2>
                <p class="hero-sub">Thoughts on identity management, security, and Microsoft technologies.</p>
                <div class="hero-ctas">
                    <a href="editor/" class="btn-primary">Write new post</a>
                </div>
            </div>
        </section>

        <section class="projects-area">
            <div class="section-wrapper">
                <h2 class="section-heading">Recent Posts</h2>
                <div class="blog-posts">
                    <!-- Blog post cards will be generated here -->
                    <p class="section-sub">No blog posts yet. <a href="editor/">Create your first post!</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2026 Geir-Hugo Hanssen</p>
        </div>
    </footer>

    <script src="../script.js"></script>
</body>

</html>
